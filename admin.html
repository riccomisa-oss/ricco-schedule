<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>리꼬 피자 — 스케줄 관리</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>RICCO PIZZA</h1>
  <span>스케줄 관리</span>
</header>

<div id="auth-gate" style="display:flex;align-items:center;justify-content:center;min-height:80vh;">
  <div class="card" style="width:320px;text-align:center;">
    <h2 style="margin-bottom:20px;">관리자 로그인</h2>
    <div class="form-group">
      <input type="password" id="admin-password" placeholder="비밀번호 입력" />
    </div>
    <button class="btn btn-primary" id="login-btn" style="width:100%;">로그인</button>
    <p id="auth-error" style="color:#C62828;margin-top:10px;font-size:13px;"></p>
  </div>
</div>

<div id="app" style="display:none;">
  <div style="padding:16px 24px;background:var(--white);border-bottom:1px solid var(--light);">
    <div class="branch-select-bar" id="branch-selector"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="employees">직원 관리</button>
    <button class="tab-btn" data-tab="conditions">조건 설정</button>
    <button class="tab-btn" data-tab="schedule">스케줄 편집</button>
    <button class="tab-btn" data-tab="requests">휴무 요청</button>
    <button class="tab-btn" data-tab="annual-leave">연차 관리</button>
    <button class="tab-btn" data-tab="share">공유 링크</button>
  </div>

  <div id="employees" class="tab-panel active"></div>
  <div id="conditions" class="tab-panel"></div>
  <div id="schedule"   class="tab-panel"></div>
  <div id="requests"   class="tab-panel"></div>
  <div id="annual-leave" class="tab-panel"></div>
  <div id="share"      class="tab-panel"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/validator.js"></script>
<script src="js/calendar.js"></script>
<script src="js/admin-employees.js"></script>
<script src="js/admin-conditions.js"></script>
<script src="js/admin-requests.js"></script>
<script src="js/admin-schedule.js"></script>
<script src="js/leave-accrual.js"></script>
<script src="js/admin-annual-leave.js"></script>
<script src="js/admin-share.js"></script>
<script>
  let currentBranchId = BRANCH_IDS.HANAM;
  let adminUnlocked = false;

  function unlockAdmin() {
    if (adminUnlocked) return; // 중복 진입(세션복원 + ?k=) 시 initAdmin 이중 호출 방지
    adminUnlocked = true;
    sessionStorage.setItem('ricco_admin', '1'); // 같은 탭 세션 동안 유지(새로고침 재입력 방지)
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initAdmin();
  }

  document.getElementById('login-btn').addEventListener('click', () => {
    const pw = document.getElementById('admin-password').value;
    if (pw === ADMIN_PASSWORD) {
      unlockAdmin();
    } else {
      document.getElementById('auth-error').textContent = '비밀번호가 틀렸습니다.';
    }
  });
  document.getElementById('admin-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  // 허브 경유 자동 통과: URL ?k= 키가 비번과 일치하면 게이트를 건너뛴다.
  // 통과 직후 주소창/히스토리에서 키를 지워 공유·뒤로가기로 키가 새는 것을 막는다.
  (function tryKeyPassthrough() {
    const k = new URLSearchParams(location.search).get('k');
    if (k && k === ADMIN_PASSWORD) {
      history.replaceState(null, '', location.pathname);
      unlockAdmin();
    }
  })();

  // 같은 탭 세션 동안 로그인 유지 — 새로고침 시 비번 재입력 방지.
  // (탭을 닫으면 sessionStorage가 비워져 자동 로그아웃 → 공용기기 안전)
  if (sessionStorage.getItem('ricco_admin') === '1') unlockAdmin();

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
      refreshCurrentTab(btn.dataset.tab);
    });
  });

  async function initAdmin() {
    const branches = await getBranches();
    const selector = document.getElementById('branch-selector');
    selector.innerHTML = branches.map(b =>
      `<button class="branch-btn ${b.id === currentBranchId ? 'active' : ''}" data-id="${b.id}">${b.name}</button>`
    ).join('');
    selector.querySelectorAll('.branch-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentBranchId = btn.dataset.id;
        selector.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        refreshCurrentTab(document.querySelector('.tab-btn.active').dataset.tab);
      });
    });
    refreshCurrentTab('employees');
  }

  function refreshCurrentTab(tab) {
    const fns = {
      employees:      () => renderEmployeesTab(currentBranchId),
      conditions:     () => renderConditionsTab(currentBranchId),
      schedule:       () => renderScheduleTab(currentBranchId),
      requests:       () => renderRequestsTab(currentBranchId),
      'annual-leave': () => renderAnnualLeaveTab(currentBranchId),
      share:          () => renderShareTab(currentBranchId),
    };
    if (fns[tab]) fns[tab]();
  }
</script>
</body>
</html>
