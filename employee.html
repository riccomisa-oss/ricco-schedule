<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리꼬 피자 — 직원 페이지</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>RICCO PIZZA</h1>
  <span id="branch-label"></span>
</header>

<div id="branch-select-screen" style="display:flex;align-items:center;justify-content:center;min-height:80vh;padding:16px;">
  <div class="card" style="width:100%;max-width:380px;">
    <h2 style="margin-bottom:24px;text-align:center;">지점을 선택하세요</h2>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <button class="btn btn-primary" style="padding:20px;font-size:17px;border-radius:10px;" data-branch-id="11111111-1111-1111-1111-111111111111">하남미사 본점</button>
      <button class="btn btn-primary" style="padding:20px;font-size:17px;border-radius:10px;" data-branch-id="22222222-2222-2222-2222-222222222222">분당미금점</button>
    </div>
  </div>
</div>

<div id="name-select-screen" style="display:none;align-items:center;justify-content:center;min-height:80vh;padding:16px;">
  <div class="card" style="width:100%;max-width:380px;">
    <h2 style="margin-bottom:16px;text-align:center;">본인 이름을 선택하세요</h2>
    <div id="name-list" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"></div>
    <p id="name-error" style="color:#C62828;margin-top:10px;font-size:13px;text-align:center;"></p>
    <button class="btn btn-ghost btn-sm" style="margin-top:16px;width:100%;color:var(--gray);" id="back-to-branch-btn">← 지점 변경</button>
  </div>
</div>

<div id="employee-app" style="display:none;">
  <div style="padding:12px 24px;background:var(--white);border-bottom:1px solid var(--light);">
    <span id="selected-name" style="font-weight:600;"></span>
    <button class="btn btn-ghost btn-sm" style="margin-left:12px;" id="change-name-btn">변경</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="emp-request">휴무 신청</button>
    <button class="tab-btn" data-tab="emp-schedule">스케줄 확인</button>
  </div>

  <div id="emp-request"  class="tab-panel active"></div>
  <div id="emp-schedule" class="tab-panel"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/validator.js"></script>
<script src="js/calendar.js"></script>
<script src="js/employee-request.js"></script>
<script src="js/employee-schedule.js"></script>
<script>
  let currentBranchId = null;
  let selectedEmployee = null;

  // 지점 선택
  document.querySelectorAll('[data-branch-id]').forEach(btn => {
    btn.addEventListener('click', async () => {
      currentBranchId = btn.dataset.branchId;
      const branches = await getBranches();
      const branch = branches.find(b => b.id === currentBranchId);
      document.getElementById('branch-label').textContent = branch?.name || '';

      document.getElementById('branch-select-screen').style.display = 'none';
      await loadNameList();
      document.getElementById('name-select-screen').style.display = 'flex';
    });
  });

  async function loadNameList() {
    const employees = await getEmployees(currentBranchId);
    const fulltime = employees.filter(e => e.employment_type !== 'parttime');
    const list = document.getElementById('name-list');
    list.innerHTML = fulltime.map(e => `
      <button class="btn btn-ghost" style="text-align:center;padding:16px 8px;font-size:15px;border-radius:10px;" data-emp-id="${e.id}">${e.name}</button>
    `).join('');
    list.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedEmployee = fulltime.find(e => e.id === btn.dataset.empId);
        selectEmployee();
      });
    });
  }

  function selectEmployee() {
    localStorage.setItem('ricco_last_branch', currentBranchId);
    localStorage.setItem(`ricco_emp_${currentBranchId}`, selectedEmployee.id);
    document.getElementById('name-select-screen').style.display = 'none';
    document.getElementById('employee-app').style.display = 'block';
    document.getElementById('selected-name').textContent = selectedEmployee.name;
    renderRequestTab(selectedEmployee, currentBranchId);
  }

  document.getElementById('change-name-btn').addEventListener('click', () => {
    localStorage.removeItem(`ricco_emp_${currentBranchId}`);
    document.getElementById('name-select-screen').style.display = 'flex';
    document.getElementById('employee-app').style.display = 'none';
    selectedEmployee = null;
  });

  document.getElementById('back-to-branch-btn').addEventListener('click', () => {
    document.getElementById('name-select-screen').style.display = 'none';
    document.getElementById('branch-select-screen').style.display = 'flex';
    document.getElementById('branch-label').textContent = '';
    currentBranchId = null;
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'emp-schedule') renderEmployeeScheduleTab(selectedEmployee, currentBranchId);
      if (btn.dataset.tab === 'emp-request')  renderRequestTab(selectedEmployee, currentBranchId);
    });
  });

  // 페이지 로드 시 URL 파라미터 + localStorage 복원
  async function init() {
    const params = new URLSearchParams(window.location.search);
    const branchParam = params.get('branch');
    const targetBranch = branchParam || localStorage.getItem('ricco_last_branch');
    if (!targetBranch) return;

    currentBranchId = targetBranch;
    const [branches, employees] = await Promise.all([getBranches(), getEmployees(targetBranch)]);
    const branch = branches.find(b => b.id === targetBranch);
    document.getElementById('branch-label').textContent = branch?.name || '';

    const savedEmpId = localStorage.getItem(`ricco_emp_${targetBranch}`);
    const fulltime = employees.filter(e => e.employment_type !== 'parttime');
    if (savedEmpId) {
      selectedEmployee = fulltime.find(e => e.id === savedEmpId);
    }

    if (selectedEmployee) {
      document.getElementById('branch-select-screen').style.display = 'none';
      document.getElementById('employee-app').style.display = 'block';
      document.getElementById('selected-name').textContent = selectedEmployee.name;
      renderRequestTab(selectedEmployee, currentBranchId);
    } else {
      document.getElementById('branch-select-screen').style.display = 'none';
      const list = document.getElementById('name-list');
      list.innerHTML = fulltime.map(e =>
        `<button class="btn btn-ghost" style="text-align:center;" data-emp-id="${e.id}">${e.name}</button>`
      ).join('');
      list.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedEmployee = fulltime.find(e => e.id === btn.dataset.empId);
          selectEmployee();
        });
      });
      document.getElementById('name-select-screen').style.display = 'flex';
    }
  }
  init();
</script>
</body>
</html>
